name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        run: pip install "mkdocs>=1.6,<2.0" mkdocs-material pymdown-extensions

      - name: Sync root docs into docs/
        run: |
          cp $GITHUB_WORKSPACE/CHANGELOG.md $GITHUB_WORKSPACE/docs/changelog.md
          cp $GITHUB_WORKSPACE/BACKLOG.md $GITHUB_WORKSPACE/docs/backlog.md

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
